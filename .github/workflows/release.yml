name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Create release and upload agent bundle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build agent bundle zip
        run: |
          mkdir -p dist
          # Zip just the agents folder — exclude the runtime cache directory
          cd .github
          zip -r ../dist/symdicate-agents.zip agents/ \
            --exclude "agents/.cache/*" \
            --exclude "agents/.cache"
          cd ..
          echo "Bundle contents:"
          unzip -l dist/symdicate-agents.zip

      - name: Extract release notes from tag message
        id: tag_notes
        env:
          TAG_REF: ${{ github.ref_name }}
        run: |
          TAG_MESSAGE=$(git tag -l --format='%(contents)' "$TAG_REF")
          if [ -z "$TAG_MESSAGE" ]; then
            TAG_MESSAGE="Release $TAG_REF"
          fi
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$TAG_MESSAGE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Generate checksums
        run: |
          cd dist
          sha256sum symdicate-agents.zip > checksums.sha256
          # Also checksum the installer scripts so users can verify before running
          sha256sum ../install.ps1 ../install.sh >> checksums.sha256
          echo "Checksums:"
          cat checksums.sha256

      - name: Create GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        env:
          TAG_REF: ${{ github.ref_name }}
        with:
          name: ${{ github.ref_name }}
          body: |
            ${{ steps.tag_notes.outputs.notes }}

            ---

            ### Installation

            **PowerShell (Windows / macOS / Linux with pwsh):**
            ```powershell
            irm https://raw.githubusercontent.com/CTOUT/Symdicate/${{ env.TAG_REF }}/install.ps1 | iex
            ```

            **Bash (macOS / Linux):**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/CTOUT/Symdicate/${{ env.TAG_REF }}/install.sh | bash
            ```

            **Manual:** download `symdicate-agents.zip` below and extract to `.github/agents/` in your repo, or `%APPDATA%\Code\User\prompts\` on Windows / `~/Library/Application Support/Code/User/prompts/` on macOS / `~/.config/Code/User/prompts/` on Linux.
          files: |
            dist/symdicate-agents.zip
            dist/checksums.sha256
            install.ps1
            install.sh
          fail_on_unmatched_files: true
