name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Create release and upload agent bundle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build agent bundle zip
        run: |
          mkdir -p dist
          # Zip just the agents folder — exclude the runtime cache directory
          cd .github
          zip -r ../dist/symdicate-agents.zip agents/ \
            --exclude "agents/.cache/*" \
            --exclude "agents/.cache"
          cd ..
          echo "Bundle contents:"
          unzip -l dist/symdicate-agents.zip

      - name: Extract release notes from tag message
        id: tag_notes
        run: |
          TAG_MESSAGE=$(git tag -l --format='%(contents)' "${{ github.ref_name }}")
          if [ -z "$TAG_MESSAGE" ]; then
            TAG_MESSAGE="Release ${{ github.ref_name }}"
          fi
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$TAG_MESSAGE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ${{ steps.tag_notes.outputs.notes }}

            ---

            ### Installation

            **PowerShell (Windows / macOS / Linux with pwsh):**
            ```powershell
            irm https://raw.githubusercontent.com/CTOUT/Symdicate/${{ github.ref_name }}/install.ps1 | iex
            ```

            **Bash (macOS / Linux):**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/CTOUT/Symdicate/${{ github.ref_name }}/install.sh | bash
            ```

            **Manual:** download `symdicate-agents.zip` below and extract to `.github/agents/` in your repo, or `%APPDATA%\Code\User\prompts\` on Windows / `~/Library/Application Support/Code/User/prompts/` on macOS / `~/.config/Code/User/prompts/` on Linux.
          files: dist/symdicate-agents.zip
          fail_on_unmatched_files: true
